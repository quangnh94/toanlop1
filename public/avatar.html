<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thời Trang Avatar - Toán Lớp 1</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/avatar.css">
</head>
<body>
  <div class="container">
    <!-- Avatar Header -->
    <div class="avatar-header">
      <h1>👗 Phòng Thay Đồ</h1>
      <p>Trang điểm cho bé của bạn!</p>

      <div class="player-gold">
        <div class="gold-emoji">💰</div>
        <div class="gold-amount" id="goldAmount">0</div>
        <div class="gold-label">Gold</div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="changing-room">
      <!-- Avatar Display -->
      <div class="avatar-showcase">
        <div class="avatar-title">✨ Bé của bạn ✨</div>

        <div class="avatar-canvas">
          <!-- Background -->
          <div class="avatar-background">
            <div class="bg-pattern"></div>
          </div>

          <!-- Avatar Base - Cute Cartoon Character -->
          <div class="doll-avatar">
            <!-- Hair Back -->
            <div class="avatar-part hair-back" id="avatar-hair-back"></div>

            <!-- Body -->
            <div class="avatar-part body">
              <div class="doll-neck"></div>
              <div class="doll-face">
                <div class="doll-head">
                  <div class="doll-face-shape">
                    <div class="doll-eye left-eye">
                      <div class="eye-pupil"></div>
                    </div>
                    <div class="doll-eye right-eye">
                      <div class="eye-pupil"></div>
                    </div>
                    <div class="doll-blush left-blush"></div>
                    <div class="doll-blush right-blush"></div>
                    <div class="doll-mouth">😊</div>
                  </div>
                </div>
              </div>

              <!-- Torso with clothes -->
              <div class="doll-torso" id="avatar-top">
                <div class="default-top">👕</div>
              </div>

              <!-- Arms -->
              <div class="doll-arm left-arm">
                <div class="doll-hand">👋</div>
              </div>
              <div class="doll-arm right-arm">
                <div class="doll-hand">✌</div>
              </div>

              <!-- Legs -->
              <div class="doll-legs">
                <div class="doll-leg left-leg" id="avatar-bottom-left">
                  <div class="default-bottom">👖</div>
                </div>
                <div class="doll-leg right-leg" id="avatar-bottom-right">
                  <div class="default-bottom">👖</div>
                </div>
              </div>

              <!-- Shoes -->
              <div class="doll-shoe left-shoe" id="avatar-shoe-left">
                <div class="default-shoe">👟</div>
              </div>
              <div class="doll-shoe right-shoe" id="avatar-shoe-right">
                <div class="default-shoe">👟</div>
              </div>
            </div>

            <!-- Hair Front -->
            <div class="avatar-part hair-front" id="avatar-hair-front">
              <div class="default-hair">💁</div>
            </div>

            <!-- Hat -->
            <div class="avatar-part hat" id="avatar-hat">
              <div class="default-hat"></div>
            </div>

            <!-- Glasses -->
            <div class="avatar-part glasses" id="avatar-glasses">
              <div class="default-glasses"></div>
            </div>

            <!-- Jewelry/Necklace -->
            <div class="avatar-part jewelry" id="avatar-jewelry">
              <div class="default-jewelry"></div>
            </div>

            <!-- Accessory (Bow, etc) -->
            <div class="avatar-part accessory" id="avatar-accessory">
              <div class="default-accessory"></div>
            </div>
          </div>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions">
          <button class="action-btn" onclick="randomizeAvatar()">🎲 Random</button>
          <button class="action-btn" onclick="resetAvatar()">🔄 Reset</button>
        </div>
      </div>

      <!-- Wardrobe Panel -->
      <div class="wardrobe-panel">
        <!-- Category Tabs -->
        <div class="wardrobe-tabs" id="wardrobeTabs">
          <button class="tab-btn active" data-category="hair">
            <span class="tab-icon">💇</span>
            <span class="tab-text">Tóc</span>
          </button>
          <button class="tab-btn" data-category="top">
            <span class="tab-icon">👕</span>
            <span class="tab-text">Áo</span>
          </button>
          <button class="tab-btn" data-category="bottom">
            <span class="tab-icon">👖</span>
            <span class="tab-text">Quần</span>
          </button>
          <button class="tab-btn" data-category="shoes">
            <span class="tab-icon">👟</span>
            <span class="tab-text">Giày</span>
          </button>
          <button class="tab-btn" data-category="accessory">
            <span class="tab-icon">🎀</span>
            <span class="tab-text">Phụ kiện</span>
          </button>
          <button class="tab-btn" data-category="hat">
            <span class="tab-icon">🎩</span>
            <span class="tab-text">Nón</span>
          </button>
          <button class="tab-btn" data-category="glasses">
            <span class="tab-icon">🤓</span>
            <span class="tab-text">Kính</span>
          </button>
          <button class="tab-btn" data-category="jewelry">
            <span class="tab-icon">💎</span>
            <span class="tab-text">Trang sức</span>
          </button>
        </div>

        <!-- Items Display -->
        <div class="wardrobe-items" id="wardrobeItems">
          <!-- Items will be loaded here -->
        </div>

        <!-- Owned Items Toggle -->
        <div class="owned-toggle">
          <button class="toggle-btn active" id="showAllBtn" onclick="showAllItems()">🛍️ Tất cả</button>
          <button class="toggle-btn" id="showOwnedBtn" onclick="showOwnedItems()">🎒 Tủ đồ</button>
        </div>
      </div>
    </div>

    <!-- Navigation -->
    <div class="exam-actions">
      <button class="btn btn-secondary" onclick="window.location.href='/'">
        <span>🏠 Trang chủ</span>
      </button>
      <button class="btn btn-secondary" onclick="window.location.href='/pet.html'">
        <span>🏠 Nhà Pet</span>
      </button>
      <button class="btn btn-secondary" onclick="window.location.href='/collection.html'">
        <span>📚 Stickers</span>
      </button>
    </div>
  </div>

  <script src="js/sound-effects.js"></script>
  <script src="js/pet-system.js"></script>
  <script src="js/avatar-system.js"></script>
  <script>
    let currentCategory = 'hair';
    let showOwnedOnly = false;

    document.addEventListener('DOMContentLoaded', async function() {
      await loadAvatarData();
      setupEventListeners();
      renderItems();
    });

    async function loadAvatarData() {
      await avatarSystem.loadItems();

      // Đồng bộ gold từ pet system
      if (typeof petSystem !== 'undefined') {
        avatarSystem.updateGold(petSystem.getGold());
      }

      updateGoldDisplay();
      updateAvatarDisplay();
    }

    function setupEventListeners() {
      // Category tabs
      document.querySelectorAll('#wardrobeTabs .tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          document.querySelectorAll('#wardrobeTabs .tab-btn').forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          currentCategory = this.dataset.category;
          renderItems();
        });
      });
    }

    function renderItems() {
      const container = document.getElementById('wardrobeItems');
      container.innerHTML = '';

      let items;
      if (showOwnedOnly) {
        items = avatarSystem.getOwnedItemsByCategory(currentCategory);
      } else {
        items = avatarSystem.getItemsByCategory(currentCategory);
      }

      if (items.length === 0) {
        container.innerHTML = '<div class="empty-message">Chưa có item nào! Hãy mua sắm nhé! 🛒</div>';
        return;
      }

      items.forEach(item => {
        const isOwned = avatarSystem.isOwned(item.id);
        const isEquipped = avatarSystem.isEquipped(item.id);

        const itemCard = document.createElement('div');
        itemCard.className = `wardrobe-item ${item.rarity} ${isEquipped ? 'equipped' : ''}`;

        itemCard.innerHTML = `
          <div class="item-preview">
            <div class="item-emoji">${item.emoji}</div>
            ${isEquipped ? '<div class="equipped-badge">✅</div>' : ''}
            ${isOwned && !isEquipped ? '<div class="owned-badge">🎒</div>' : ''}
          </div>
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-price">${isOwned ? 'Đã mua' : `💰 ${item.price}`}</div>
          </div>
          <div class="item-actions">
            ${!isOwned ? `
              <button class="btn-buy" onclick="buyItem('${item.id}')" ${avatarSystem.gold < item.price ? 'disabled' : ''}>
                🛒 Mua
              </button>
            ` : `
              <button class="btn-equip" onclick="equipItem('${item.id}')">
                ${isEquipped ? '👔 Tháo' : '👔 Mặc'}
              </button>
            `}
          </div>
        `;

        container.appendChild(itemCard);
      });
    }

    async function buyItem(itemId) {
      const result = await avatarSystem.buyItem(itemId);

      if (result.success) {
        if (typeof soundManager !== 'undefined') {
          soundManager.playClick();
        }

        showMessage(`Đã mua ${result.item.name}! 🎉`, 'success');

        // Cập nhật gold ở pet system
        if (typeof petSystem !== 'undefined') {
          petSystem.gold = avatarSystem.getGold();
          petSystem.savePetData();
        }

        updateGoldDisplay();
        renderItems();
      } else {
        showMessage(result.message, 'error');
      }
    }

    function equipItem(itemId) {
      const item = avatarSystem.items.find(i => i.id === itemId);
      const isEquipped = avatarSystem.isEquipped(itemId);

      if (isEquipped) {
        // Tháo gỡ
        const result = avatarSystem.unequipItem(item.category);
        if (result.success) {
          showMessage(`Đã tháo ${item.name}`, 'success');
        }
      } else {
        // Trang bị
        const result = avatarSystem.equipItem(itemId);
        if (result.success) {
          if (typeof soundManager !== 'undefined') {
            soundManager.playCorrect();
          }
          showMessage(`Đã mặc ${item.name}! ✨`, 'success');
        }
      }

      updateAvatarDisplay();
      renderItems();
    }

    function updateAvatarDisplay() {
      const categories = ['hat', 'glasses', 'hair', 'jewelry', 'top', 'accessory', 'bottom', 'shoes'];

      // Reset all to default
      document.querySelectorAll('[id^="avatar-"]').forEach(el => {
        const defaultEl = el.querySelector('.default-' + el.id.split('-')[1]);
        if (defaultEl) {
          defaultEl.style.display = 'block';
        }
        el.style.background = '';
        el.querySelector('.avatar-content')?.remove();
      });

      // Update with equipped items
      categories.forEach(category => {
        const item = avatarSystem.getEquippedItem(category);

        if (item) {
          const avatarPart = document.getElementById(`avatar-${category}`);
          if (avatarPart) {
            // Hide default
            const defaultEl = avatarPart.querySelector('.default-' + category);
            if (defaultEl) {
              defaultEl.style.display = 'none';
            }

            // Show equipped item
            avatarPart.style.background = item.color || '#f5f5f5';
            avatarPart.style.boxShadow = `0 0 20px ${item.color}40`;

            if (!avatarPart.querySelector('.avatar-content')) {
              const content = document.createElement('div');
              content.className = 'avatar-content';
              content.style.cssText = `
                position: absolute;
                width: 100%;
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 40px;
                font-weight: bold;
                color: ${item.color || '#333'};
                text-shadow: 0 2px 4px rgba(0,0,0,0.2);
              `;
              content.textContent = item.emoji;
              avatarPart.appendChild(content);
            }

            avatarPart.querySelector('.avatar-content').textContent = item.emoji;
          }
        }
      });
    }

    function updateGoldDisplay() {
      document.getElementById('goldAmount').textContent = avatarSystem.getGold();
    }

    function showAllItems() {
      showOwnedOnly = false;
      document.getElementById('showAllBtn').classList.add('active');
      document.getElementById('showOwnedBtn').classList.remove('active');
      renderItems();
    }

    function showOwnedItems() {
      showOwnedOnly = true;
      document.getElementById('showAllBtn').classList.remove('active');
      document.getElementById('showOwnedBtn').classList.add('active');
      renderItems();
    }

    function randomizeAvatar() {
      const categories = ['hair', 'top', 'bottom', 'shoes', 'accessory', 'hat', 'glasses', 'jewelry'];

      categories.forEach(category => {
        const ownedItems = avatarSystem.getOwnedItemsByCategory(category);
        if (ownedItems.length > 0) {
          const randomItem = ownedItems[Math.floor(Math.random() * ownedItems.length)];
          avatarSystem.equipItem(randomItem.id);
        }
      });

      updateAvatarDisplay();
      renderItems();
      showMessage('🎲 Đổi trang phục ngẫu nhiên!', 'success');
    }

    function resetAvatar() {
      const categories = ['hat', 'glasses', 'hair', 'jewelry', 'top', 'accessory', 'bottom', 'shoes'];

      // Reset to defaults
      avatarSystem.equippedItems = {
        hair: null,
        top: null,
        bottom: null,
        shoes: null,
        accessory: null,
        hat: null,
        glasses: null,
        jewelry: null
      };
      avatarSystem.saveAvatarData();

      updateAvatarDisplay();
      renderItems();
      showMessage('🔄 Đã reset về mặc định!', 'success');
    }

    function showMessage(message, type) {
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = message;
      toast.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 15px 25px;
        border-radius: 50px;
        font-weight: bold;
        z-index: 1000;
        animation: slideIn 0.3s ease;
      `;

      if (type === 'success') {
        toast.style.background = 'linear-gradient(135deg, #11998e 0%, #38ef7d 100%)';
        toast.style.color = 'white';
      } else {
        toast.style.background = '#FF6B6B';
        toast.style.color = 'white';
      }

      document.body.appendChild(toast);

      setTimeout(() => {
        toast.remove();
      }, 3000);
    }
  </script>
</body>
</html>
