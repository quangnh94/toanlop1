<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bản Đồ Phiêu Lưu - Toán Lớp 1</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/world-map.css">
</head>
<body>
  <div class="container">
    <!-- World Header -->
    <div class="world-header">
      <h1>🗺️ Bản Đồ Phiêu Lưu</h1>
      <p>Khám phá thế giới hoạt hình và thu thập sticker!</p>

      <div class="progress-overview">
        <div class="progress-item">
          <div class="progress-value" id="worldsUnlocked">1</div>
          <div class="progress-label">Đã mở</div>
        </div>
        <div class="progress-item">
          <div class="progress-value" id="totalWorlds">9</div>
          <div class="progress-label">Tổng</div>
        </div>
        <div class="progress-item">
          <div class="progress-value" id="explorationProgress">11%</div>
          <div class="progress-label">Hoàn thành</div>
        </div>
      </div>
    </div>

    <!-- Map Display -->
    <div class="map-display" id="mapDisplay">
      <!-- SVG connections will be drawn here -->
      <svg class="svg-connections" id="svgConnections"></svg>

      <!-- World nodes will be placed here -->
      <div id="worldNodes"></div>

      <!-- World tooltip -->
      <div class="world-tooltip" id="worldTooltip">
        <h3 id="tooltipTitle">World Name</h3>
        <p id="tooltipDescription">Description</p>
        <div class="unlock-requirement" id="tooltipRequirement"></div>
        <div class="rewards" id="tooltipRewards"></div>
      </div>
    </div>

    <!-- World List -->
    <div class="world-list" id="worldList"></div>

    <!-- World Detail Modal -->
    <div class="world-detail-modal" id="worldDetailModal">
      <div class="world-detail-content">
        <button class="close-modal" onclick="closeWorldModal()">&times;</button>

        <div class="world-detail-header">
          <div class="world-detail-emoji" id="modalEmoji">🏡</div>
          <h2 class="world-detail-title" id="modalTitle">World Name</h2>
          <p class="world-detail-description" id="modalDescription">Description</p>
        </div>

        <div class="world-detail-stats">
          <div class="world-stat">
            <div class="world-stat-label">Level</div>
            <div class="world-stat-value" id="modalLevel">1</div>
          </div>
          <div class="world-stat">
            <div class="world-stat-label">Thử thách</div>
            <div class="world-stat-value" id="modalChallenges">5 câu</div>
          </div>
          <div class="world-stat">
            <div class="world-stat-label">Stickers</div>
            <div class="world-stat-value" id="modalStickerCount">5</div>
          </div>
          <div class="world-stat">
            <div class="world-stat-label">Boss</div>
            <div class="world-stat-value" id="modalBoss">—</div>
          </div>
        </div>

        <div class="world-stickers">
          <h4>🎁 Stickers trong vùng này</h4>
          <div class="sticker-preview" id="modalStickers"></div>
        </div>

        <div class="world-actions" id="worldActions">
          <h4>🎮 Hành động</h4>
          <div class="action-buttons">
            <button class="btn btn-explore" id="btnExplore" onclick="exploreWorld()">
              <span>🗺️ Khám phá</span>
            </button>
            <button class="btn btn-travel" id="btnTravel" onclick="travelToWorld()">
              <span>🚶 Đi đến</span>
            </button>
          </div>
        </div>

        <div class="boss-section" id="bossSection">
          <h4>👹 Boss</h4>
          <div class="boss-info">
            <div class="boss-emoji" id="bossEmoji">👹</div>
            <div class="boss-stats">
              <div class="boss-name" id="bossName">Boss Name</div>
              <div class="boss-level">Level <span id="bossLevel">10</span></div>
            </div>
          </div>
          <button class="btn-battle" id="btnBattle">⚔️ Đánh bại</button>
        </div>

        <div class="result-actions">
          <button class="btn btn-secondary" onclick="closeWorldModal()">Đóng</button>
        </div>
      </div>
    </div>

    <!-- Navigation -->
    <div class="exam-actions">
      <button class="btn btn-secondary" onclick="window.location.href='/'">
        <span>🏠 Trang chủ</span>
      </button>
      <button class="btn btn-secondary" onclick="window.location.href='/pet.html'">
        <span>🏠 Nhà Pet</span>
      </button>
      <button class="btn btn-secondary" onclick="window.location.href='/collection.html'">
        <span>📚 Stickers</span>
      </button>
    </div>
  </div>

  <script src="js/sound-effects.js"></script>
  <script src="js/pet-system.js"></script>
  <script src="js/world-map.js"></script>
  <script>
    let worlds = [];
    let selectedWorld = null;

    // Load worlds
    document.addEventListener('DOMContentLoaded', async function() {
      await loadWorlds();
      renderMap();
      renderWorldList();
      updateProgress();
    });

    async function loadWorlds() {
      const data = await worldMapSystem.loadWorlds();
      worlds = data.worlds;
    }

    function renderMap() {
      const container = document.getElementById('worldNodes');
      container.innerHTML = '';

      worlds.forEach(world => {
        const node = document.createElement('div');
        node.className = 'world-node';
        node.style.left = world.position.x + '%';
        node.style.top = world.position.y + '%';

        const isUnlocked = worldMapSystem.isWorldUnlocked(world.id);
        const isCurrent = worldMapSystem.currentWorld === world.id;
        const hasBoss = world.boss !== null;
        const isBossDefeated = world.boss && worldMapSystem.isBossDefeated(world.boss.id);

        if (!isUnlocked) {
          node.classList.add('locked');
        } else if (isCurrent) {
          node.classList.add('active');
        } else if (isBossDefeated) {
          node.classList.add('completed');
        }

        if (hasBoss && !isBossDefeated) {
          node.classList.add('boss');
        }

        node.textContent = world.emoji;
        node.onclick = () => showWorldDetail(world);
        node.onmouseenter = () => showTooltip(world);
        node.onmouseleave = hideTooltip;

        container.appendChild(node);
      });

      // Draw connections
      drawConnections();
    }

    function drawConnections() {
      const svg = document.getElementById('svgConnections');
      const container = document.getElementById('mapDisplay');
      const width = container.offsetWidth;
      const height = container.offsetHeight;

      svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
      svg.innerHTML = '';

      const connections = worldMapSystem.getConnections();

      connections.forEach(conn => {
        const fromWorld = worlds.find(w => w.id === conn.from);
        const toWorld = worlds.find(w => w.id === conn.to);

        if (!fromWorld || !toWorld) return;

        const isUnlocked = worldMapSystem.isWorldUnlocked(conn.to);
        const isCompleted = toWorld && worldMapSystem.isBossDefeated(toWorld.boss?.id);

        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', (fromWorld.position.x / 100) * width);
        line.setAttribute('y1', (fromWorld.position.y / 100) * height);
        line.setAttribute('x2', (toWorld.position.x / 100) * width);
        line.setAttribute('y2', (toWorld.position.y / 100) * height);
        line.setAttribute('class', 'connection-line');

        if (!isUnlocked) {
          line.classList.add('locked');
        } else if (isCompleted) {
          line.classList.add('completed');
        }

        svg.appendChild(line);
      });
    }

    function renderWorldList() {
      const container = document.getElementById('worldList');
      container.innerHTML = '';

      worlds.forEach(world => {
        const isUnlocked = worldMapSystem.isWorldUnlocked(world.id);
        const canUnlock = worldMapSystem.canUnlockWorld(world.id);
        const isCurrent = worldMapSystem.currentWorld === world.id;

        const card = document.createElement('div');
        card.className = `world-card ${!isUnlocked ? 'locked' : ''}`;
        card.onclick = () => isUnlocked ? showWorldDetail(world) : tryUnlockWorld(world);

        const canUnlockNow = canUnlock.canUnlock;
        const needLevel = !canUnlockNow && canUnlock.requiredLevel;

        card.innerHTML = `
          <div class="world-card-header" style="background: ${world.backgroundColor}">
            <div class="world-card-emoji">${world.emoji}</div>
            <div class="world-card-title">${world.name}</div>
          </div>
          <div class="world-card-body">
            <p class="world-card-description">${world.description}</p>
            <div class="world-card-stats">
              <div class="world-stat-mini">
                <div class="world-stat-mini-label">Level</div>
                <div class="world-stat-mini-value">${world.unlockLevel}</div>
              </div>
              <div class="world-stat-mini">
                <div class="world-stat-mini-label">Stickers</div>
                <div class="world-stat-mini-value">${world.stickers?.length || 0}</div>
              </div>
            </div>
            ${world.boss ? `
              <div class="boss-info-mini">
                <span>👹 Boss: ${world.boss.name}</span>
              </div>
            ` : ''}
          </div>
          <div class="world-card-footer">
            ${!isUnlocked ? `
              <span class="unlock-requirement">
                ${needLevel ? `Level ${canUnlock.requiredLevel}` : 'Locked'}
              </span>
              <button class="unlock-btn" ${!canUnlockNow ? 'disabled' : ''}>
                ${isCurrent ? 'Đang ở đây' : canUnlockNow ? 'Mở ngay' : '🔒'}
              </button>
            ` : isCurrent ? `
              <span class="unlock-requirement">Đang ở đây</span>
            ` : `
              <button class="unlock-btn">Đi đến</button>
            `}
          </div>
        `;

        container.appendChild(card);
      });
    }

    function showTooltip(world) {
      const tooltip = document.getElementById('worldTooltip');
      const canUnlock = worldMapSystem.canUnlockWorld(world.id);

      document.getElementById('tooltipTitle').textContent = world.name;
      document.getElementById('tooltipDescription').textContent = world.description;

      if (!worldMapSystem.isWorldUnlocked(world.id)) {
        document.getElementById('tooltipRequirement').textContent = canUnlock.requiredLevel || 'Locked';
        document.getElementById('tooltipRequirement').style.display = 'block';
      } else {
        document.getElementById('tooltipRequirement').style.display = 'none';
      }

      // Show rewards
      const rewardsDiv = document.getElementById('tooltipRewards');
      if (world.rewards) {
        let rewardsHTML = '';
        if (world.rewards.xp) {
          rewardsHTML += `<div class="reward-item">
            <span class="reward-label">XP:</span> ${world.rewards.xp}
          </div>`;
        }
        if (world.rewards.gold) {
          rewardsHTML += `<div class="reward-item">
            <span class="reward-label">Gold:</span> ${world.rewards.gold}
          </div>`;
        }
        if (world.rewards.pet) {
          rewardsHTML += `<div class="reward-item">
            <span class="reward-label">Pet:</span> 🥚
          </div>`;
        }
        rewardsDiv.innerHTML = rewardsHTML;
      }

      // Position tooltip
      const mapContainer = document.getElementById('mapDisplay');
      const rect = mapContainer.getBoundingClientRect();

      tooltip.style.left = world.position.x + '%';
      tooltip.style.top = (world.position.y - 15) + '%';
      tooltip.classList.add('visible');
    }

    function hideTooltip() {
      document.getElementById('worldTooltip').classList.remove('visible');
    }

    function showWorldDetail(world) {
      selectedWorld = world;

      document.getElementById('modalEmoji').textContent = world.emoji;
      document.getElementById('modalTitle').textContent = world.name;
      document.getElementById('modalDescription').textContent = world.description;
      document.getElementById('modalLevel').textContent = world.unlockLevel;
      document.getElementById('modalStickerCount').textContent = world.stickers?.length || 0;
      document.getElementById('modalChallenges').textContent = (world.challenges || 10) + ' câu';

      // World actions section
      const actionsSection = document.getElementById('worldActions');
      const btnExplore = document.getElementById('btnExplore');
      const btnTravel = document.getElementById('btnTravel');

      const isUnlocked = worldMapSystem.isWorldUnlocked(world.id);
      const isCurrent = worldMapSystem.currentWorld === world.id;

      if (isUnlocked) {
        actionsSection.style.display = 'block';

        if (isCurrent) {
          btnExplore.innerHTML = '<span>🗺️ Làm thử thách (' + (world.challenges || 10) + ' câu)</span>';
          btnExplore.disabled = false;
          btnExplore.classList.remove('disabled');
          btnTravel.style.display = 'none';
        } else {
          btnExplore.innerHTML = '<span>🗺️ Làm thử thách (' + (world.challenges || 10) + ' câu)</span>';
          btnExplore.disabled = false;
          btnExplore.classList.remove('disabled');
          btnTravel.style.display = 'inline-block';
        }
      } else {
        actionsSection.style.display = 'none';
      }

      // Boss section
      const bossSection = document.getElementById('bossSection');
      if (world.boss) {
        const isDefeated = worldMapSystem.isBossDefeated(world.boss.id);

        document.getElementById('bossEmoji').textContent = world.boss.emoji;
        document.getElementById('bossName').textContent = world.boss.name;
        document.getElementById('bossLevel').textContent = world.boss.level;

        const btn = document.getElementById('btnBattle');
        if (isDefeated) {
          btn.textContent = '✅ Đã đánh bại';
          btn.disabled = true;
        } else {
          btn.textContent = '⚔️ Đánh bại';
          btn.disabled = false;
          btn.onclick = () => battleBoss(world.boss);
        }

        bossSection.style.display = 'block';
      } else {
        bossSection.style.display = 'none';
      }

      // Stickers
      const stickersDiv = document.getElementById('modalStickers');
      stickersDiv.innerHTML = '';

      if (world.stickers && world.stickers.length > 0) {
        world.stickers.forEach(stickerId => {
          const stickerDiv = document.createElement('div');
          stickerDiv.className = 'sticker-preview-item';
          stickerDiv.textContent = getStickerEmoji(stickerId);
          stickersDiv.appendChild(stickerDiv);
        });
      }

      document.getElementById('worldDetailModal').classList.add('show');
    }

    function exploreWorld() {
      if (!selectedWorld) return;

      // Lưu world ID để tạo đề thi phù hợp
      localStorage.setItem('selectedWorld', JSON.stringify({
        id: selectedWorld.id,
        name: selectedWorld.name,
        challenges: selectedWorld.challenges || 10
      }));

      // Tạo đề thi với số câu hỏi theo world
      const examData = {
        count: selectedWorld.challenges || 10,
        types: null, // Tất cả các loại
        difficulty: null // Tất cả độ khó
      };

      // Gọi API tạo đề thi
      fetch('/api/exam/generate', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(examData)
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          // Lưu thông tin đề thi và world
          localStorage.setItem('currentExam', JSON.stringify(data.exam));
          localStorage.setItem('currentWorld', selectedWorld.id);

          // Chuyển đến trang làm bài
          closeWorldModal();
          window.location.href = '/exam';
        } else {
          showMessage('Lỗi: ' + data.message, 'error');
        }
      })
      .catch(error => {
        console.error('Lỗi:', error);
        showMessage('Có lỗi xảy ra. Vui lòng thử lại!', 'error');
      });
    }

    function travelToWorld() {
      if (!selectedWorld) return;

      const result = worldMapSystem.travelToWorld(selectedWorld.id);

      if (result.success) {
        showMessage(`Đã đến ${selectedWorld.name}!`, 'success');
        renderMap();
        renderWorldList();
        closeWorldModal();
      } else {
        showMessage(result.message, 'error');
      }
    }

    function closeWorldModal() {
      document.getElementById('worldDetailModal').classList.remove('show');
    }

    function tryUnlockWorld(world) {
      const result = worldMapSystem.unlockWorld(world.id);

      if (result.success) {
        if (typeof soundManager !== 'undefined') {
          soundManager.playCorrect();
        }

        showMessage(`Đã mở ${world.name}!`, 'success');
        renderMap();
        renderWorldList();
        updateProgress();

        // Show rewards
        if (result.rewards) {
          if (result.rewards.pet) {
            showMessage(`Nhận pet: ${result.rewards.pet}!`, 'success');
          }
        }
      } else {
        if (typeof soundManager !== 'undefined') {
          soundManager.playIncorrect();
        }

        showMessage(result.message, 'error');
      }
    }

    function battleBoss(boss) {
      const userLevel = petSystem.getLevel();

      if (userLevel < boss.level) {
        showMessage(`Cần Level ${boss.level} để đánh bại ${boss.name}!`, 'error');
        return;
      }

      // Battle mini-game (simplified)
      const won = confirm(`⚔️ Bắt đầu battle với ${boss.name}? (Level ${boss.level})`);

      if (won) {
        const result = worldMapSystem.defeatBoss(boss.id);

        if (result.success) {
          if (typeof soundManager !== 'undefined') {
            soundManager.playFanfare();
          }

          showMessage(result.message, 'success');
          renderMap();
          renderWorldList();

          // Show rewards
          if (result.rewards) {
            showMessage(`Thưởng: ${result.rewards.xp} XP, ${result.rewards.gold} Gold`, 'success');
          }
        }
      }
    }

    function updateProgress() {
      const progress = worldMapSystem.getProgress();
      document.getElementById('worldsUnlocked').textContent = progress.unlocked;
      document.getElementById('totalWorlds').textContent = progress.total;
      document.getElementById('explorationProgress').textContent = progress.percentage + '%';
    }

    function getStickerEmoji(stickerId) {
      // Simple mapping - could be improved
      const stickerEmojis = {
        'cat-white': '🐱',
        'dog-golden': '🐕',
        'rabbit-pink': '🐰',
        'cinnamoroll-1': '☁️',
        'pikachu-1': '⚡',
        'spongebob-1': '🧽'
      };
      return stickerEmojis[stickerId] || '🎁';
    }

    function showMessage(message, type) {
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = message;
      toast.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 15px 20px;
        border-radius: 10px;
        font-weight: bold;
        z-index: 1000;
        animation: slideIn 0.3s ease;
      `;

      if (type === 'success') {
        toast.style.background = 'linear-gradient(135deg, #11998e 0%, #38ef7d 100%)';
        toast.style.color = 'white';
      } else {
        toast.style.background = '#FF6B6B';
        toast.style.color = 'white';
      }

      document.body.appendChild(toast);

      setTimeout(() => {
        toast.remove();
      }, 3000);
    }

    // Redraw connections on resize
    window.addEventListener('resize', () => {
      drawConnections();
    });

    // Lắng nghe sự kiện level up
    window.addEventListener('levelUp', () => {
      updateProgress();
      renderWorldList();
    });
  </script>
</body>
</html>
